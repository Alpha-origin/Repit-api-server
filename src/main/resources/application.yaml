spring:
  application:
    name: Repit_api_server

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    aws:
      credentials:
        access-key: ${AWS_S3_ACCESS_KEY}
        secret-key: ${AWS_S3_SECRET_KEY}
      s3:
        bucket: ${S3_BUCKET}
        base-url: ${S3_URL}
      region:
        static: ${AWS_REGION}

auth-server:
  base-url: ${AUTH_SERVER}
